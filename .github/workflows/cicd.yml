name: professional resume pipleline

on:
    push:
        branches: ["main"]

jobs:
    build: 
        runs-on: ubuntu-latest # macos, windows
        steps: 
            - name: clone the code
              uses: actions/checkout@v4
            - name: Build image
              run: 
                docker build -t mzsterling/cicd-portfolio . #building our image wich we called cicd-portfoio
            - name : Docker login
              run: docker login
            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Push image
              run: 
                dcker push mzsterling/cicd-portfolio
        
