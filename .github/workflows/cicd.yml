name : Build and Push to ECR

on: 
    push: 
        #pull_request:
           # branches: ['main']
        branches: [ 'main' ]

permissions: 
    id-token: write
    contents: read

jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout the Code
              uses: actions/checkout@v7
            - name: Tryivy Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'         # file scan
                severity: HIGH,CRITICAL
                exit-code: 0    # exit code 0 to ignore the vulnerability, i to fail and exit
                
            - name: Build Docker Image
              run: docker build -t ${{ secrets.ECR_REPO}}/my-repo:latest .          
            
            -  name: Scan image with Trivy 
               uses: aquasecurity/trivy-action@v0.36.0 
               with: 
                image-ref: ${{ secrets.ECR_REPO}}m/my-repo:latest
                format: table 
                exit-code: 0 # exit code 0 to ignore the vulnrabilities, i to fail and exit
                ignore-unfixed: true 
                severity: CRITICAL,HIGH

            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v4 
                with:
                    aws-region: ${{ secrets.AWS_REGION}}
                    role-to-assume: ${{ secrets.AWS_ROLE }}
            -   name: Login to Amason ECR
                id: login-ecr
                uses: aws-actions/amazon-ecr-login@v2

            -   name: Push image to ECR
                run: docker push ${{ secrets.ECR_REPO}}/my-repo:latest

    Deploy_to_ecs:
        needs: build_scan
        runs-on: ubuntu-latest
        steps: 
            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v4 
                with:
                    aws-region: ${{ secrets.AWS_REGION}}
                    role-to-assume: ${{ secrets.AWS_ROLE }}
            -   name: Deplopy to ECS
                run: echo "deploy to ecs"




            